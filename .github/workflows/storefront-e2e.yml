name: Storefront E2E

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fade_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fade_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: e2e
    env:
      E2E_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fade_e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install test dependencies
        run: npm ci

      - name: Install storefront dependencies
        working-directory: .
        run: npm ci

      - name: Apply database migrations
        working-directory: .
        run: npx prisma migrate deploy

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build storefront
        working-directory: .
        run: npm run build

      - name: Start storefront
        working-directory: .
        run: |
          npm run start > /tmp/storefront.log 2>&1 &
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/storefront.log
          exit 1

      - name: Run storefront verification
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storefront-playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore
          retention-days: 14
